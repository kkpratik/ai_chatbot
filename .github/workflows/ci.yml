name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build iOS app
        run: |
          xcodebuild build \
            -scheme ChatWithAI \
            -destination 'platform=iOS Simulator,name=iPhone 16'
